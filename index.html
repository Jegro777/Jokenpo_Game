<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jokenpô</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="principal">
      <h1 id="titulo">Pedra, Papel ou Tesoura</h1>

      <div id="placar">
        <div id="jogador">
          <h2 id="jogador-nome"></h2>
          <span id="jogador-pontos">0</span>
          <ul id="jogador-escolha">
            <li><a id="jogador-escolha-1"><img src="img/hand_stone.png" alt="imagem pedra"/></a></li>
            <li><a id="jogador-escolha-2"><img src="img/hand_paper.png" alt="imagem papel"/></a></li>
            <li><a id="jogador-escolha-3"><img src="img/hand_scissors.png" alt="imagem tesoura"/></a></li>
          </ul>
        </div>
        
        <div id="versus">vs</div>

        <div id="computador">
          <h2 id="computador-nome">Computador</h2>
          <span id="computador-pontos">0</span>
          <ul id="computador-escolha">
            <li><a id="computador-escolha-1"><img src="img/hand_stone.png" alt="imagem pedra"/></a></li>
            <li><a id="computador-escolha-2"><img src="img/hand_paper.png" alt="imagem papel"/></a></li>
            <li><a id="computador-escolha-3"><img src="img/hand_scissors.png" alt="imagem tesoura"/></a></li>
          </ul>
        </div>
      </div>
      <div id="mensagem">mensagem</div>

      <script src="script.js"></script>
</body>
</html>
